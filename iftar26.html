<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iftar 26 Mahfil</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="assets/js/config.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(#062b22,#021a14);
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
background:rgba(0,40,30,.85);
border-radius:15px;
box-shadow:0 0 30px rgba(255,215,0,.3);
}

h1,h2{
text-align:center;
color:#FFD700;
}

.counter{
text-align:center;
font-size:20px;
margin:20px 0;
color:#FFD700;
}

.recent{
background:rgba(255,215,0,.05);
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.recent ul{
padding-left:20px;
}

button{
background:linear-gradient(45deg,#FFD700,#1bb85d);
color:white;
border:none;
padding:15px;
font-size:18px;
border-radius:8px;
cursor:pointer;
width:100%;
}

form{
display:none;
margin-top:20px;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:none;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-top:20px;
}

.gallery figure{
margin:0;
text-align:center;
}

.gallery img{
width:100%;
border-radius:10px;
}

.success-msg{
display:none;
color:lightgreen;
text-align:center;
font-weight:bold;
}

.error-msg{
display:none;
color:red;
text-align:center;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>🌙 Iftar Mahfil 2026 🌙</h1>

<p style="text-align:center">
📅 28 Ramadan — 18 March 2026 <br>
📍 Panchagarh BP Government High School
</p>

<div class="counter">
👥 Registered: <span id="regCount">Loading...</span>
</div>

<div class="recent">
<h3>Recent Registrations</h3>
<ul id="recentList"></ul>
</div>

<button id="registerBtn">Register Now</button>

<form id="iftar26Form">

<input type="text" id="name" placeholder="Name" required>
<input type="email" id="email" placeholder="Email" required>
<input type="text" id="phone" placeholder="Phone" required>

<select id="paymentMethod" required>
<option value="">Payment Method</option>
<option>Bkash</option>
<option>Nagad</option>
<option>Rocket</option>
<option>Bank</option>
</select>

<input type="text" id="transId" placeholder="Transaction ID" required>

<button type="submit">Submit Registration</button>

<p class="success-msg" id="successMsg">
Registration successful! See you at Iftar.
</p>

<p class="error-msg" id="errorMsg">
Something went wrong.
</p>

</form>

<h2>Past Iftar Memories</h2>

<div class="gallery">

<figure>
<img src="assets/img/iftar2022.jpg">
<figcaption>2022</figcaption>
</figure>

<figure>
<img src="assets/img/iftar2023.jpg">
<figcaption>2023</figcaption>
</figure>

<figure>
<img src="assets/img/iftar2024.jpg">
<figcaption>2024</figcaption>
</figure>

<figure>
<img src="assets/img/iftar2025.jpg">
<figcaption>2025</figcaption>
</figure>

</div>

</div>

<script>

const registerBtn=document.getElementById("registerBtn");
const form=document.getElementById("iftar26Form");

registerBtn.onclick=()=>{
form.style.display="block";
registerBtn.style.display="none";
}

const successMsg=document.getElementById("successMsg");
const errorMsg=document.getElementById("errorMsg");

form.addEventListener("submit",async(e)=>{

e.preventDefault();

const name=document.getElementById("name").value;
const email=document.getElementById("email").value;
const phone=document.getElementById("phone").value;
const paymentMethod=document.getElementById("paymentMethod").value;
const transId=document.getElementById("transId").value;

const {error}=await supabaseClient
.from("iftar26_registrations")
.insert([{name,email,phone,payment_method:paymentMethod,transaction_id:transId}]);

if(error){
console.error(error);
errorMsg.style.display="block";
successMsg.style.display="none";
}else{

successMsg.style.display="block";
errorMsg.style.display="none";

form.reset();

loadStats();

}

});

async function loadStats(){

const {count}=await supabaseClient
.from("iftar26_registrations")
.select("*",{count:"exact",head:true});

document.getElementById("regCount").innerText=count;

const {data}=await supabaseClient
.from("iftar26_registrations")
.select("name")
.order("created_at",{ascending:false})
.limit(5);

const list=document.getElementById("recentList");
list.innerHTML="";

data.forEach(user=>{
const li=document.createElement("li");
li.innerText=user.name;
list.appendChild(li);
});

}

loadStats();

</script>

</body>
</html>
