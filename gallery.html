<body onload="protectPage(); loadGallery();">

<header class="hero" style="padding: 60px 20px;">
    <h1>Batch Memories</h1>
    <p>Relive the best moments of our school days</p>
    <div style="margin-top: 20px;">
        <input type="file" id="photoUpload" hidden accept="image/*" onchange="uploadPhoto(this)">
        <button class="btn-yellow" onclick="document.getElementById('photoUpload').click()">+ Upload New Photo</button>
    </div>
</header>

<div class="container" style="padding: 40px 8%;">
    <div class="member-grid" id="galleryContainer">
        </div>
</div>

<div id="lightbox" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; cursor:pointer; align-items:center; justify-content:center;" onclick="this.style.display='none'">
    <img id="lightboxImg" src="" style="max-width:90%; max-height:90%; border-radius:8px;">
</div>
